<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ===== SPLASH ===== -->
  <div id="splash">
    <div class="bokeh" id="bokeh"></div>
    <div class="splash-text">click to enter...</div>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }

:root {
  --ruby:   #9B1B30;
  --ruby2:  #C0392B;
  --ruby3:  #FF4757;
  --dark:   #0a0608;
  --dark2:  #110a0d;
  --glass:  rgba(20,8,12,0.72);
  --text:   #f0dde2;
  --muted:  #9a7a82;
}

/* ========== SPLASH ========== */
#splash {
  position:fixed; inset:0; z-index:1000;
  background:var(--dark);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:opacity 0.9s ease;
}
#splash.hide { opacity:0; pointer-events:none; }
.bokeh { position:absolute; inset:0; overflow:hidden; }
.bokeh span {
  position:absolute; border-radius:50%; filter:blur(18px); opacity:0;
  animation:bokehFloat linear infinite;
}
@keyframes bokehFloat {
  0%   { transform:translateY(110vh) scale(0.5); opacity:0; }
  10%  { opacity:0.6; }
  90%  { opacity:0.3; }
  100% { transform:translateY(-20vh) scale(1.2); opacity:0; }
}
.splash-text {
  position:relative; z-index:2;
  font-family:'Cinzel',serif; font-size:clamp(13px,2.5vw,18px);
  color:#fff; letter-spacing:0.35em; text-transform:lowercase;
  animation:breathe 2.5s ease-in-out infinite;
}
@keyframes breathe { 0%,100%{opacity:0.4} 50%{opacity:1} }

/* ========== MAIN ========== */
#main {
  min-height:100vh; position:relative;
  display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity 1.1s ease 0.2s; overflow:hidden;
}
#main.show { opacity:1; }

.bg-img {
  position:absolute; inset:0;
  background:url('') center/cover no-repeat;
  filter:brightness(0.35) saturate(0.8); z-index:0;
}
.bg-overlay {
  position:absolute; inset:0; z-index:1;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(155,27,48,0.45) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 70%, rgba(60,5,15,0.6)   0%, transparent 55%),
    linear-gradient(180deg, rgba(10,6,8,0.3) 0%, rgba(10,6,8,0.7) 100%);
}
.particles { position:absolute; inset:0; z-index:2; pointer-events:none; overflow:hidden; }
.particle {
  position:absolute; top:-20px; border-radius:50% 0 50% 0; opacity:0;
  animation:fall linear infinite;
}
@keyframes fall {
  0%   { transform:translateY(-20px) rotate(0deg);   opacity:0; }
  5%   { opacity:0.8; }
  95%  { opacity:0.4; }
  100% { transform:translateY(105vh) rotate(720deg); opacity:0; }
}
.scanlines {
  position:absolute; inset:0; z-index:3; pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);
}

/* ========== CARD (mobile default) ========== */
.card {
  position:relative; z-index:10;
  width:min(420px,92vw);
  background:var(--glass);
  backdrop-filter:blur(20px) saturate(1.4);
  -webkit-backdrop-filter:blur(20px) saturate(1.4);
  border:1px solid rgba(155,27,48,0.28);
  border-radius:20px;
  padding:44px 32px 36px;
  box-shadow:0 0 0 1px rgba(255,255,255,0.04) inset, 0 32px 80px rgba(0,0,0,0.6), 0 0 60px rgba(155,27,48,0.18);
  animation:cardIn 0.9s cubic-bezier(.22,.68,0,1.15) both;
}
@keyframes cardIn {
  from { opacity:0; transform:translateY(36px) scale(0.96); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}
.card::before {
  content:''; position:absolute; top:0; left:10%; right:10%; height:1px;
  background:linear-gradient(90deg,transparent,var(--ruby3),var(--ruby),transparent);
  border-radius:100%; box-shadow:0 0 18px 2px rgba(192,57,43,0.55);
}

/* Avatar */
.avatar-section { display:flex; flex-direction:column; align-items:center; margin-bottom:20px; }
.avatar-ring { position:relative; width:96px; height:96px; margin-bottom:16px; }
.avatar-ring::before {
  content:''; position:absolute; inset:-4px; border-radius:50%;
  background:conic-gradient(var(--ruby3),var(--ruby),#3d0010,var(--ruby3));
  animation:spin 4s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.avatar-ring::after {
  content:''; position:absolute; inset:-8px; border-radius:50%;
  background:conic-gradient(transparent 60%,rgba(155,27,48,0.4));
  animation:spin 6s linear infinite reverse;
}
.avatar-img {
  position:absolute; inset:4px; border-radius:50%;
  background:url('') center/cover no-repeat var(--dark2);
  border:3px solid var(--dark2); z-index:1; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  font-family:'Cinzel',serif; font-size:2rem; color:var(--ruby3);
}
.name {
  font-family:'Cinzel',serif; font-size:1.6rem; font-weight:600;
  color:#fff; letter-spacing:0.05em;
  text-shadow:0 0 30px rgba(192,57,43,0.6); margin-bottom:6px;
}
.name span { color:var(--ruby3); }
.bio { font-family:'Inter',sans-serif; font-size:0.78rem; color:var(--muted); letter-spacing:0.06em; text-align:center; margin-bottom:4px; font-style:italic; }
.view-count { display:inline-flex; align-items:center; gap:5px; font-size:0.7rem; color:rgba(155,27,48,0.7); letter-spacing:0.05em; margin-top:6px; }

.divider { height:1px; margin:22px 0; background:linear-gradient(90deg,transparent,rgba(155,27,48,0.4),transparent); }

/* Contacts */
.contacts { display:flex; flex-direction:column; gap:10px; }
.contact-item {
  display:flex; align-items:center; gap:14px; text-decoration:none;
  padding:12px 14px; border-radius:12px;
  background:rgba(255,255,255,0.03); border:1px solid rgba(155,27,48,0.15);
  transition:all 0.28s ease; position:relative; overflow:hidden;
  opacity:0; transform:translateX(-18px);
}
.contact-item.show { animation:slideIn 0.5s ease forwards; }
@keyframes slideIn { to { opacity:1; transform:translateX(0); } }
.contact-item::after {
  content:''; position:absolute; top:0; left:-100%; width:60%; height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.05),transparent);
  transition:left 0.5s ease;
}
.contact-item:hover::after { left:140%; }
.contact-item:hover {
  background:rgba(155,27,48,0.12); border-color:rgba(155,27,48,0.4);
  transform:translateX(5px);
  box-shadow:0 4px 20px rgba(155,27,48,0.15),inset 0 0 20px rgba(155,27,48,0.05);
}
.icon-wrap {
  width:40px; height:40px; border-radius:11px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; color:#fff; transition:all 0.28s ease;
}
.contact-item:hover .icon-wrap { transform:scale(1.85) rotate(15deg); }
.social-icon {
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; color: #fff;
  text-decoration: none;
  border: 1.5px solid rgba(155,27,48,0.4);      /* viền ruby mờ */
  background: rgba(155,27,48,0.1);               /* nền ruby trong suốt */
  transition: all 0.28s ease;
  position: relative; overflow: hidden;
}

.social-icon::before {
  content:''; position:absolute; inset:0; border-radius:50%;
  background: linear-gradient(135deg, var(--ruby), var(--ruby3));
  opacity:0; transition:opacity 0.28s;
}
.social-icon:hover::before { opacity:1; }   /* ← gradient hiện ra khi hover */

.social-icon:hover {
  transform: translateY(-4px) scale(1.1);          /* nổi lên + phóng to */
  box-shadow: 0 6px 22px rgba(155,27,48,0.45);     /* glow đỏ */
  border-color: var(--ruby3);                       /* viền sáng hơn */
}

.contact-text { flex:1; display:flex; flex-direction:column; }
.contact-label { font-size:0.62rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); line-height:1; font-family:'Inter',sans-serif; }
.contact-value { font-size:0.85rem; color:var(--text); font-weight:400; margin-top:3px; font-family:'Inter',sans-serif; }
.arrow { color:rgba(155,27,48,0.5); font-size:0.7rem; transition:all 0.25s; }
.contact-item:hover .arrow { color:var(--ruby3); transform:translateX(4px); }

.btn-save {
  display:flex; align-items:center; justify-content:center; gap:8px;
  margin-top:22px; width:100%; padding:14px;
  background:linear-gradient(135deg,var(--ruby) 0%,var(--ruby2) 100%);
  color:#fff; font-family:Arial, Helvetica, sans-serif; font-size:0.82rem; letter-spacing:0.12em;
  border:none; border-radius:12px; cursor:pointer; text-decoration:none;
  transition:all 0.3s ease; position:relative; overflow:hidden;
  box-shadow:0 4px 20px rgba(155,27,48,0.35);
}
.btn-save::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,var(--ruby2),var(--ruby3));
  opacity:0; transition:opacity 0.3s;
}
.btn-save:hover::before { opacity:1; }
.btn-save:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(155,27,48,0.5); }
.btn-save span { position:relative; z-index:1; }

.nfc-tag {
  display:flex; align-items:center; justify-content:center; gap:6px;
  margin-top:16px; font-size:0.62rem; color:rgba(155,27,48,0.45);
  letter-spacing:0.15em; font-family:'Cinzel',serif;
}

/* Music btn */
#music-btn {
  position:fixed; bottom:22px; right:22px;
  width:50px; height:50px; border-radius:50%;
  background:linear-gradient(135deg,var(--ruby),#3d0010);
  border:1px solid rgba(155,27,48,0.5);
  cursor:pointer; z-index:999;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 20px rgba(155,27,48,0.4); transition:all 0.3s ease;
}
#music-btn:hover { transform:scale(1.1); box-shadow:0 6px 28px rgba(155,27,48,0.6); }
#music-btn.playing::before, #music-btn.playing::after {
  content:''; position:absolute; border-radius:50%;
  border:1.5px solid rgba(192,57,43,0.5); animation:ripple2 2s linear infinite;
}
#music-btn.playing::after { animation-delay:1s; }
@keyframes ripple2 {
  0%   { width:50px; height:50px; opacity:0.8; }
  100% { width:100px; height:100px; opacity:0; }
}
.note-icon { font-size:18px; color:#fff; z-index:1; }
#music-btn.playing .note-icon { display:none; }
.eq-bars { display:none; align-items:flex-end; gap:2px; height:18px; z-index:1; }
#music-btn.playing .eq-bars { display:flex; }
.eq-bars span {
  display:block; width:3px; border-radius:2px;
  background:linear-gradient(to top,var(--ruby3),#fff);
  animation:eq 0.7s ease-in-out infinite alternate;
}
.eq-bars span:nth-child(1){height:7px;  animation-delay:0s;}
.eq-bars span:nth-child(2){height:14px; animation-delay:0.12s;}
.eq-bars span:nth-child(3){height:9px;  animation-delay:0.25s;}
.eq-bars span:nth-child(4){height:16px; animation-delay:0.08s;}
.eq-bars span:nth-child(5){height:5px;  animation-delay:0.2s;}
@keyframes eq { from{transform:scaleY(0.3)} to{transform:scaleY(1)} }

/* ================================================
   DESKTOP OVERRIDE — chỉ ghi đè layout >= 1025px
   ================================================ */

   @media(min-width: 50px){
.avatar-img img{
    height: 100px;
  }
   }
@media (min-width: 1025px) {

  /* Main flex center */
  #main {
    align-items: center;
    justify-content: center;
    padding: 40px 0;
  }

  /* Bỏ card wrapper, dùng layout 3 cột thay thế */
  .card {
    width: auto;
    max-width: none;
    background: transparent;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    border: none;
    border-radius: 0;
    padding: 0;
    box-shadow: none;
    animation: none;
    opacity: 1;

    display: grid;
    grid-template-columns: 380px 1px 1fr;
    gap: 0 48px;
    align-items: center;
    width: min(1100px, 94vw);
  }

  .avatar-img img{
    height: 147px;
  }

  /* Ẩn top glow bar của card trên desktop */
  .card::before { display: none; }

  /* ---- CỘT TRÁI: avatar-section ---- */
  .avatar-section {
    grid-column: 1;
    grid-row: 1 / 6;
    align-self: center;

    /* glass panel */
    background: var(--glass);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border: 1px solid rgba(155,27,48,0.28);
    border-radius: 28px;
    padding: 48px 32px 40px;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.04) inset,
                0 32px 80px rgba(0,0,0,0.6),
                0 0 60px rgba(155,27,48,0.2);
    position: relative;
    margin-bottom: 0;
    min-height: 460px;
    justify-content: center;

    animation: cardIn 0.8s cubic-bezier(.22,.68,0,1.15) both;
  }

  /* top bar cho panel trái */
  .avatar-section::before {
    content:''; position:absolute; top:0; left:10%; right:10%; height:1px;
    background:linear-gradient(90deg,transparent,var(--ruby3),var(--ruby),transparent);
    border-radius:100%; box-shadow:0 0 18px 2px rgba(192,57,43,0.55);
  }

  /* avatar ring lớn hơn */
  .avatar-ring {
    width: 140px; height: 140px;
    margin-bottom: 24px;
  }
  .avatar-img { font-size: 3rem; }

  .name { font-size: 2rem; }

  /* ---- ĐƯỜNG KẺ DỌC ---- */
  .divider {
    grid-column: 2;
    grid-row: 1 / 6;
    width: 1px; height: 80%;
    align-self: center;
    background: linear-gradient(to bottom, transparent, rgba(155,27,48,0.5), transparent);
    margin: 0;
  }

  /* ---- CỘT PHẢI: contacts + btn ---- */
  .contacts {
    grid-column: 3;
    grid-row: 1;
    gap: 14px;
    animation: slideRight 0.8s cubic-bezier(.22,.68,0,1.15) 0.2s both;
  }
  @keyframes slideRight { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }

  /* contact items to hơn trên desktop */
  .contact-item {
    padding: 16px 20px;
    border-radius: 16px;
    background: var(--glass);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(155,27,48,0.2);
  }
  .contact-item:hover { transform: translateX(8px); }

  .icon-wrap { width: 48px; height: 48px; font-size: 19px; border-radius: 13px; }
  .contact-label { font-size: 0.65rem; }
  .contact-value { font-size: 0.92rem; }

  /* btn save dưới contacts */
  .btn-save {
    grid-column: 3;
    grid-row: 2;
    margin-top: 14px;
    border-radius: 14px;
    padding: 16px;
    font-size: 0.85rem;
    animation: slideRight 0.8s cubic-bezier(.22,.68,0,1.15) 0.35s both;
  }

  /* nfc tag */
  .nfc-tag {
    grid-column: 3;
    grid-row: 3;
    justify-content: flex-start;
    margin-top: 10px;
    animation: slideRight 0.8s cubic-bezier(.22,.68,0,1.15) 0.45s both;
  }
}
</style>

  <script>
    /* ---- Bokeh trên splash ---- */
    const bokehEl = document.getElementById('bokeh');
    const rubyColors = ['rgba(155,27,48,0.5)', 'rgba(192,57,43,0.4)', 'rgba(255,71,87,0.35)', 'rgba(61,0,16,0.6)', 'rgba(120,10,30,0.45)'];
    for (let i = 0; i < 22; i++) {
      const s = document.createElement('span');
      const size = 30 + Math.random() * 90;
      s.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random() * 100}%;
    background:${rubyColors[Math.floor(Math.random() * rubyColors.length)]};
    animation-duration:${6 + Math.random() * 10}s;
    animation-delay:${Math.random() * 8}s;
  `;
      bokehEl.appendChild(s);
    }

    /* ---- Falling particles on main ---- */
    const partEl = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = 3 + Math.random() * 7;
      const colors = ['rgba(155,27,48,0.7)', 'rgba(255,71,87,0.6)', 'rgba(192,57,43,0.5)', 'rgba(255,255,255,0.15)'];
      p.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random() * 100}%;
    background:${colors[Math.floor(Math.random() * colors.length)]};
    filter: blur(${Math.random() * 1.5}px);
    animation-duration:${7 + Math.random() * 12}s;
    animation-delay:${Math.random() * 10}s;
  `;
      partEl.appendChild(p);
    }

    /* ---- Splash click → bật nhạc + hiện main ---- */
    const splash = document.getElementById('splash');
    const main = document.getElementById('main');
    const music = document.getElementById('bg-music');
    const musicBtn = document.getElementById('music-btn');
    let playing = false;

    splash.addEventListener('click', () => {
      // phát nhạc
      music.play().catch(() => { });
      playing = true;
      musicBtn.classList.add('playing');

      // ẩn splash
      splash.classList.add('hide');
      setTimeout(() => { splash.style.display = 'none'; }, 950);

      // hiện main
      main.classList.add('show');

      // animate contact items
      setTimeout(() => {
        document.querySelectorAll('.contact-item').forEach((el, i) => {
          setTimeout(() => el.classList.add('show'), i * 130);
        });
      }, 500);
    });

    /* ---- Music toggle button ---- */
    musicBtn.addEventListener('click', () => {
      if (!playing) {
        music.play();
        musicBtn.classList.add('playing');
        playing = true;
      } else {
        music.pause();
        musicBtn.classList.remove('playing');
        playing = false;
      }
    });
  </script>
